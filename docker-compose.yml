services:
  postgres:
    image: postgres:16-alpine
    container_name: agronodo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: agronodo
      POSTGRES_PASSWORD: agronodo
      POSTGRES_DB: agronodo
    ports:
      - "5432:5432"
    volumes:
      - agronodo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agronodo -d agronodo"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  agronodo_postgres_data:
